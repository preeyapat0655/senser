<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DHT11 Smart Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, #f7f9fc 100%);
      color: #1f2937;
    }
    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }
    h1 {
      text-align: center;
      color: #2450d3;
      font-size: 54px;
      margin: 10px 0 18px;
      font-weight: 800;
    }
    .top-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 12px 22px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
      transition: .2s;
    }
    button:hover { transform: translateY(-1px); }
    .btn-refresh { background: #2d6df6; color: #fff; }
    .btn-clear { background: #ff5a5a; color: #fff; }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 24px;
    }
    .card {
      background: #fff;
      border-radius: 22px;
      padding: 22px 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      min-height: 150px;
    }
    .card-title {
      font-size: 18px;
      color: #444;
      margin-bottom: 18px;
      font-weight: 700;
    }
    .big-value {
      font-size: 56px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.1;
    }
    .status-normal { color: #16a34a; font-weight: 800; font-size: 30px; }
    .status-alert { color: #dc2626; font-weight: 800; font-size: 30px; }
    .sub-text {
      margin-top: 8px;
      font-size: 15px;
      color: #555;
      line-height: 1.5;
    }

    .panel {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      padding: 24px;
      margin-bottom: 22px;
    }
    .panel h2 {
      margin: 0 0 20px;
      font-size: 24px;
      color: #111827;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 430px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: #fff;
    }
    th, td {
      padding: 12px 10px;
      text-align: center;
      border-bottom: 1px solid #ececec;
      font-size: 15px;
    }
    th {
      background: #f3f6fb;
      font-weight: 800;
    }
    tr:hover td {
      background: #fafcff;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 38px; }
      .big-value { font-size: 42px; }
    }

    @media (max-width: 640px) {
      .cards { grid-template-columns: 1fr; }
      .container { padding: 18px 12px 40px; }
      h1 { font-size: 32px; }
      .card { min-height: auto; }
      .chart-wrap { height: 320px; }
      th, td { font-size: 13px; padding: 10px 6px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DHT11 Smart Dashboard</h1>

    <div class="top-actions">
      <button class="btn-refresh" onclick="location.reload()">รีเฟรชหน้า</button>
      <button class="btn-clear" onclick="clearHistory()">ล้างประวัติย้อนหลัง</button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">อุณหภูมิปัจจุบัน</div>
        <div class="big-value" id="tempValue">-- °C</div>
      </div>

      <div class="card">
        <div class="card-title">ความชื้นปัจจุบัน</div>
        <div class="big-value" id="humValue">-- %</div>
      </div>

      <div class="card">
        <div class="card-title">สถานะ</div>
        <div id="statusValue" class="status-normal">กำลังโหลด...</div>
        <div class="sub-text" id="statusMessage">-</div>
      </div>

      <div class="card">
        <div class="card-title">อัปเดตล่าสุด</div>
        <div style="font-size: 24px; font-weight: 800;" id="updateTime">-</div>
        <div class="sub-text" id="updateDate">-</div>
      </div>
    </div>

    <div class="panel">
      <h2>กราฟย้อนหลังอุณหภูมิ / ความชื้น</h2>
      <div class="chart-wrap">
        <canvas id="sensorChart"></canvas>
      </div>
      <div class="muted" style="margin-top:12px;">
        แสดงข้อมูลย้อนหลังล่าสุดจาก Firebase
      </div>
    </div>

    <div class="panel">
      <h2>ตารางย้อนหลังล่าสุด</h2>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>เวลา</th>
              <th>อุณหภูมิ (°C)</th>
              <th>ความชื้น (%)</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="historyTable">
            <tr><td colspan="4">กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // Firebase config ของเธอ
    // =========================
    const firebaseConfig = {
      apiKey: "ใส่ apiKey ของเธอ",
      authDomain: "dht11-dashboard-e92d3.firebaseapp.com",
      databaseURL: "https://dht11-dashboard-e92d3-default-rtdb.firebaseio.com",
      projectId: "dht11-dashboard-e92d3",
      storageBucket: "dht11-dashboard-e92d3.firebasestorage.app",
      messagingSenderId: "ใส่ของเธอถ้ามี",
      appId: "ใส่ของเธอถ้ามี"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let chart;

    function formatThaiDateTime(timestampSec) {
      if (!timestampSec) return { time: "-", date: "-" };
      const d = new Date(timestampSec * 1000);

      const time = d.toLocaleTimeString("th-TH", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      const date = d.toLocaleDateString("th-TH", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      return { time, date };
    }

    function getStatusText(status) {
      return status === "alert" ? "แจ้งเตือน" : "ปกติ";
    }

    function renderCurrentSensor(data) {
      if (!data) return;

      document.getElementById("tempValue").textContent =
        (data.temperature ?? "--") + " °C";

      document.getElementById("humValue").textContent =
        (data.humidity ?? "--") + " %";

      const statusEl = document.getElementById("statusValue");
      const msgEl = document.getElementById("statusMessage");

      const status = data.status || "normal";
      const message = data.message || "-";

      statusEl.textContent = getStatusText(status);
      statusEl.className = status === "alert" ? "status-alert" : "status-normal";
      msgEl.textContent = message;

      const t = formatThaiDateTime(data.updated_at);
      document.getElementById("updateTime").textContent = t.time;
      document.getElementById("updateDate").textContent = t.date;
    }

    function renderHistory(historyObj) {
      const tbody = document.getElementById("historyTable");

      if (!historyObj) {
        tbody.innerHTML = `<tr><td colspan="4">ยังไม่มีข้อมูลย้อนหลัง</td></tr>`;
        if (chart) chart.destroy();
        return;
      }

      let rows = Object.entries(historyObj).map(([key, val]) => ({
        key,
        ...val
      }));

      // เรียงจากเก่า -> ใหม่
      rows.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

      // เอาเฉพาะล่าสุด 20 จุด
      const latest = rows.slice(-20);

      // ตาราง: แสดงใหม่สุดบนสุด
      const tableRows = [...latest].reverse();

      tbody.innerHTML = "";
      tableRows.forEach(item => {
        const t = formatThaiDateTime(item.timestamp);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${t.date} ${t.time}</td>
          <td>${item.temperature ?? "-"}</td>
          <td>${item.humidity ?? "-"}</td>
          <td>${getStatusText(item.status)}</td>
        `;
        tbody.appendChild(tr);
      });

      const labels = latest.map(item => {
        const d = new Date((item.timestamp || 0) * 1000);
        return d.toLocaleTimeString("th-TH", {
          hour: "2-digit",
          minute: "2-digit"
        });
      });

      const tempData = latest.map(item => item.temperature ?? null);
      const humData = latest.map(item => item.humidity ?? null);

      if (chart) chart.destroy();

      const ctx = document.getElementById("sensorChart").getContext("2d");
      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            {
              label: "อุณหภูมิ (°C)",
              data: tempData,
              borderColor: "#ef4444",
              backgroundColor: "rgba(239,68,68,0.15)",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4,
              fill: false,
              yAxisID: "y"
            },
            {
              label: "ความชื้น (%)",
              data: humData,
              borderColor: "#2563eb",
              backgroundColor: "rgba(37,99,235,0.15)",
              tension: 0.35,
              borderWidth: 3,
              pointRadius: 4,
              fill: false,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: "index",
            intersect: false
          },
          plugins: {
            legend: {
              position: "top",
              labels: {
                font: { size: 14 }
              }
            }
          },
          scales: {
            y: {
              type: "linear",
              position: "left",
              title: {
                display: true,
                text: "อุณหภูมิ (°C)"
              }
            },
            y1: {
              type: "linear",
              position: "right",
              grid: {
                drawOnChartArea: false
              },
              title: {
                display: true,
                text: "ความชื้น (%)"
              }
            }
          }
        }
      });
    }

    function clearHistory() {
      if (!confirm("ต้องการล้างประวัติย้อนหลังทั้งหมดใช่ไหม?")) return;
      db.ref("history").remove()
        .then(() => alert("ล้างประวัติย้อนหลังเรียบร้อย"))
        .catch(err => alert("ล้างไม่สำเร็จ: " + err.message));
    }

    // =========================
    // ดึงค่าปัจจุบันแบบ realtime
    // =========================
    db.ref("sensor").on("value", (snapshot) => {
      const data = snapshot.val();
      renderCurrentSensor(data);
    });

    // =========================
    // ดึง history แบบ realtime
    // =========================
    db.ref("history").on("value", (snapshot) => {
      const data = snapshot.val();
      renderHistory(data);
    });
  </script>
</body>
</html>
